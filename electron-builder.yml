appId: com.aetheris.app
productName: Aetheris
directories:
  buildResources: resources/build
  output: build/dist
files:
  - '!build/dist/*'
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
extraResources:
  # ALL resources go INSIDE the app folder for x64 Windows
  - from: 'assets/lists/roblox_items.db'
    to: 'assets/lists/roblox_items.db'
  - from: 'resources/app-update.yml'
    to: 'app-update.yml'
  - from: 'resources/icon.png'
    to: 'resources/icon.png'
  - from: 'resources/build/icons/win/icon.ico'
    to: 'resources/build/icons/win/icon.ico'
asar: true
compression: maximum
win:
  executableName: Aetheris
  legalTrademarks: Aetheris
  fileAssociations: []
  icon: resources/build/icons/win/icon.ico
nsis:
  oneClick: false
  perMachine: true                # ensures files go to C:\Program Files
  allowToChangeInstallationDirectory: true
  runAfterFinish: true
  deleteAppDataOnUninstall: false
  installerIcon: resources/build/icons/win/icon.ico
  uninstallerIcon: resources/build/icons/win/icon.ico
  artifactName: Aetheris-Setup.${ext}
  uninstallDisplayName: Aetheris
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: Aetheris
mac:
  identity: "-"
  executableName: Aetheris
  category: public.app-category.utilities
  icon: resources/build/icons/mac/icon.icns
  entitlements: entitlements.plist
  entitlementsInherit: entitlements.plist
  extendInfo:
    CFBundleName: Aetheris
    CFBundleDisplayName: Aetheris
    NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
  target:
    - dmg
    - zip
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
  icon: resources/build/icons/png
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: github
  owner: sashaga2a24
  repo: installer
